name: Frontend - Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "staticwebapp.config.json"
      - ".github/workflows/frontend-static-web-app.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - "frontend/**"
      - "staticwebapp.config.json"
      - ".github/workflows/frontend-static-web-app.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Static Web Apps config
        run: cp staticwebapp.config.json frontend/staticwebapp.config.json

      - name: Upload Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          api_location: ""
          output_location: dist
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AUTH_CLIENT_ID: ${{ secrets.VITE_AUTH_CLIENT_ID }}
          VITE_AUTH_AUTHORITY: ${{ secrets.VITE_AUTH_AUTHORITY }}
          VITE_AUTH_REDIRECT_URI: ${{ secrets.VITE_AUTH_REDIRECT_URI }}
          VITE_API_SCOPE: ${{ secrets.VITE_API_SCOPE }}

  close-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
